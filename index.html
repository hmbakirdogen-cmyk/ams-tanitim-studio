<!doctype html>
<!-- TARAYICI CEVIRISI KAPALI (translate="no"):
     NE      : Tarayicinin (Chrome "Bu sayfayi cevir" / Google Translate / ceviri eklentisi) sayfayi otomatik cevirmesini ENGELLE.
     NEDEN   : Ceviri, React'in yonettigi yazi dugumlerini <font> etiketine sarip TASIR -> React bir sonraki guncellemede
               "insertBefore: node ... is not a child" hatasi firlatir -> ErrorBoundary sonsuz donguye girer, ekran coker.
               Bu uygulamanin ZATEN kendi TR/EN/JA cevirisi var (useLang/t) -> tarayici cevirisi hem GEREKSIZ hem ZARARLI.
               Japonya HQ demosu icin KRITIK: Japon izleyicinin Chrome'u arayuzu otomatik cevirmeye kalkar -> ayni cokme onlarda da olurdu.
     NASIL   : html translate="no" + <meta name="google" content="notranslate"> + body class="notranslate" (3 katman, tum tarayicilar).
     YAN ETKI: Uygulama ici dil secici (TR/EN/JA) AYNEN calisir (JS tabanli, tarayici cevirisinden bagimsiz). -->
<html lang="tr" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="google" content="notranslate" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0072CE" />
    <meta name="description" content="SMC Hava Yonetim Sistemi - canli tanitim ve enerji tasarrufu studyosu" />

    <!-- TARAYICI SEKME SIMGESI (favicon): yoksa tarayici otomatik /favicon.ico ister -> 404 (zararsiz ama konsol gurultusu).
         icon.svg'yi favicon olarak baglayinca 404 biter + sekmede SMC ikonu gorunur. Vite, base'i (or. /ams-tanitim-studio/) otomatik ekler.
         PNG fallback: SVG favicon desteklemeyen tarayicilar icin. -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/png" href="/pwa-192.png" />

    <!-- PWA / iOS: "Ana Ekrana Ekle" ile tam ekran (standalone) acilis + SMC ikonu.
         iOS apple-touch-icon SVG'yi desteklemez -> PNG sart; manifest <link>'i vite-plugin-pwa otomatik enjekte eder. -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AMS Stüdyo" />

    <title>SMC · Hava Yönetim Sistemi — Tanıtım Stüdyosu</title>
  </head>
  <body class="notranslate">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
